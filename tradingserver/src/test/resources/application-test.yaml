server:
  port: 9988

spring:
  application:
    name: tradingserver
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 105MB


  datasource:
    name: tradingdb
    url: ${MYSQL_URL}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=UTC
    username: ${MYSQL_USER:sa}
    password: ${MYSQL_PASSWORD:password}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER}
    hikari:
      max-lifetime: 2000
      connection-timeout: 2000

  flyway:
    locations: classpath:db/migration

  sql:
    init:
      mode: always


  #jpa settings
  jpa:
    show-sql: false
    properties:
      hibernate.format_sql: true
    hibernate:
      ddl-auto: none

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus
    health:
      mail:
        enabled: false


#JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expirations: ${JWT_EXPIRATION}
  reset-password-xpiration: ${JWT_RESET_PASSWORD_EXPIRATION}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}
  server-access-expiration: ${JWT_SERVER_ACCESS_EXPIRATION}


# AWS Credentials
cloud:
  aws:
    region:
      static: ${AWS_REGION}